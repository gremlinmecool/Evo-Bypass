services:
  # Backend API + Discord Bot
  - type: web
    name: evo-bypass-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DISCORD_TOKEN
        sync: false # Add your Discord bot token in Render dashboard
      - key: DISCORD_CLIENT_ID
        value: 1503006516620427304
      - key: DISCORD_CLIENT_SECRET
        sync: false # Add your Discord client secret in Render dashboard
      - key: DISCORD_PERMISSIONS
        value: 8
      - key: CLIENT_ORIGIN
        sync: false # Set this manually to your frontend URL
      - key: MONGO_URI
        sync: false # Optional - add if using MongoDB

  # Frontend Static Site
  - type: web
    name: evo-bypass-frontend
    env: static
    region: oregon
    buildCommand: echo "No build needed"
    staticPublishPath: ./website
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
