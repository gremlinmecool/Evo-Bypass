stages:
  - build
  - test
  - deploy

variables:
  NODE_VERSION: "20"

# Build Backend
build:backend:
  stage: build
  image: node:${NODE_VERSION}
  cache:
    paths:
      - backend/node_modules/
  script:
    - cd backend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - backend/dist/
    expire_in: 1 hour
  only:
    - main
    - master

# Build Frontend
build:frontend:
  stage: build
  image: node:${NODE_VERSION}
  cache:
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour
  only:
    - main
    - master

# Test API
test:api:
  stage: test
  image: node:${NODE_VERSION}
  script:
    - cd backend
    - npm ci
    - echo "Running tests..."
    - npm test || echo "No tests configured"
  only:
    - main
    - master

# Deploy to Production Server
deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
  script:
    # Stop the app
    - ssh $SERVER_USER@$SERVER_IP "pm2 stop evo-bypass || true"
    
    # Sync files to server
    - rsync -avz --delete --exclude 'node_modules' --exclude '.env' ./backend/ $SERVER_USER@$SERVER_IP:~/evo-bypass/backend/
    - rsync -avz --delete --exclude 'node_modules' ./website/ $SERVER_USER@$SERVER_IP:~/evo-bypass/website/
    
    # Install dependencies and restart
    - ssh $SERVER_USER@$SERVER_IP "cd ~/evo-bypass/backend && npm ci && npm run build"
    - ssh $SERVER_USER@$SERVER_IP "pm2 restart evo-bypass || pm2 start ~/evo-bypass/backend/dist/server.js --name evo-bypass"
    - ssh $SERVER_USER@$SERVER_IP "pm2 save"
    
    # Show status
    - ssh $SERVER_USER@$SERVER_IP "pm2 status"
  environment:
    name: production
    url: https://your-domain.com
  only:
    - main
    - master
  when: manual

# Deploy Discord Bot
deploy:bot:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
  script:
    - ssh $SERVER_USER@$SERVER_IP "cd ~/evo-bypass/backend && pm2 restart evo-bypass"
    - ssh $SERVER_USER@$SERVER_IP "pm2 logs evo-bypass --lines 50"
  only:
    - main
    - master
  when: manual
